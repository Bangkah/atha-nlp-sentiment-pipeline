name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint (syntax)
        run: make lint

      - name: Test
        run: make test

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: atha-text-classifier:ci

  docker-smoke:
    runs-on: ubuntu-latest

    env:
      API_KEYS_JSON: '{"demo-key":{"owner":"demo","rpm":30},"limit-key":{"owner":"limited","rpm":2}}'
      ADMIN_API_KEY: admin-secret
      USAGE_DB_PATH: /tmp/usage.db
      MODEL_DIR: /tmp/model

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker Compose env
        run: |
          cat > .env <<EOF
          API_KEYS_JSON=${API_KEYS_JSON}
          ADMIN_API_KEY=${ADMIN_API_KEY}
          USAGE_DB_PATH=${USAGE_DB_PATH}
          MODEL_DIR=${MODEL_DIR}
          EOF

      - name: Start API with Docker Compose
        run: docker compose up --build -d

      - name: Wait for API health
        run: |
          for i in {1..40}; do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 3
          done
          echo "API healthcheck failed"
          docker compose logs --no-color api
          exit 1

      - name: Download model artifacts for smoke test
        run: |
          docker compose exec -T \
            -e HOME=/tmp \
            -e HF_HOME=/tmp/hf \
            -e XDG_CACHE_HOME=/tmp/.cache \
            -e TRANSFORMERS_CACHE=/tmp/hf/transformers \
            api python - <<'PY'
          from pathlib import Path
          from huggingface_hub import snapshot_download

          Path('/tmp/hf').mkdir(parents=True, exist_ok=True)
          Path('/tmp/.cache').mkdir(parents=True, exist_ok=True)

          snapshot_download(
            repo_id="Bangkah/atha-text-classifier",
            local_dir="/tmp/model",
          )
          PY

      - name: Smoke test predict and usage endpoints
        run: |
          unauthorized_code=$(curl -s -o /tmp/unauthorized.json -w "%{http_code}" \
            -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"text":"produk ini bagus"}')
          if [ "$unauthorized_code" != "401" ]; then
            echo "Unauthorized predict should return 401, got $unauthorized_code"
            cat /tmp/unauthorized.json || true
            docker compose logs --no-color api
            exit 1
          fi

          predict_code=$(curl -s -o /tmp/predict.json -w "%{http_code}" \
            -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -H "X-API-Key: demo-key" \
            -d '{"text":"produk ini bagus"}')
          if [ "$predict_code" != "200" ]; then
            echo "Predict endpoint failed with status $predict_code"
            cat /tmp/predict.json || true
            docker compose logs --no-color api
            exit 1
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/predict.json').read_text())

          required = {'request_id', 'label', 'confidence'}
          missing = required - payload.keys()
          if missing:
              raise SystemExit(f'Predict payload missing fields: {sorted(missing)}')

          if payload['label'] not in {'negative', 'neutral', 'positive'}:
              raise SystemExit(f"Invalid label value: {payload['label']!r}")

          confidence = payload['confidence']
          if not isinstance(confidence, (float, int)):
              raise SystemExit('Confidence is not numeric')
          if not (0.0 <= float(confidence) <= 1.0):
              raise SystemExit(f'Confidence out of range: {confidence}')
          PY

          usage_code=$(curl -s -o /tmp/usage.json -w "%{http_code}" \
            http://127.0.0.1:8000/usage/summary \
            -H "X-Admin-Key: admin-secret")
          if [ "$usage_code" != "200" ]; then
            echo "Usage endpoint failed with status $usage_code"
            cat /tmp/usage.json || true
            docker compose logs --no-color api
            exit 1
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/usage.json').read_text())

          if 'window_seconds' not in payload or 'items' not in payload:
              raise SystemExit('Usage payload missing required fields')

          if not isinstance(payload['items'], list):
              raise SystemExit('Usage items should be a list')

          for idx, item in enumerate(payload['items']):
              required = {'owner', 'total_requests', 'success_requests', 'failed_requests'}
              missing = required - item.keys()
              if missing:
                  raise SystemExit(f'Usage item {idx} missing fields: {sorted(missing)}')
          PY

          bad_admin_code=$(curl -s -o /tmp/bad_admin.json -w "%{http_code}" \
            http://127.0.0.1:8000/usage/summary \
            -H "X-Admin-Key: wrong-secret")
          if [ "$bad_admin_code" != "401" ]; then
            echo "Usage with wrong admin key should return 401, got $bad_admin_code"
            cat /tmp/bad_admin.json || true
            docker compose logs --no-color api
            exit 1
          fi

          limit_1=$(curl -s -o /tmp/limit1.json -w "%{http_code}" \
            -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -H "X-API-Key: limit-key" \
            -d '{"text":"produk ini bagus"}')
          limit_2=$(curl -s -o /tmp/limit2.json -w "%{http_code}" \
            -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -H "X-API-Key: limit-key" \
            -d '{"text":"produk ini cukup"}')
          limit_3=$(curl -s -o /tmp/limit3.json -w "%{http_code}" \
            -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -H "X-API-Key: limit-key" \
            -d '{"text":"produk ini jelek"}')
          if [ "$limit_1" != "200" ] || [ "$limit_2" != "200" ] || [ "$limit_3" != "429" ]; then
            echo "Rate-limit check failed: expected 200,200,429 but got $limit_1,$limit_2,$limit_3"
            cat /tmp/limit1.json || true
            cat /tmp/limit2.json || true
            cat /tmp/limit3.json || true
            docker compose logs --no-color api
            exit 1
          fi

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
